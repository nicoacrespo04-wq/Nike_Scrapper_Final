          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Correr scraper Meli Nike
        run: python codigo_meli_nike_mobile_v7_skip_paused.py

      - name: Subir outputs Meli Nike
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outputs-meli-nike
          path: |
            meli_vs_nike_*.xlsx
            meli_vs_nike_*.csv
          retention-days: 30

  # ─────────────────────────────────────────
  # 4) DIGITAL SPORT
  # ─────────────────────────────────────────
  digitalsport:
    name: Digital Sport
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Correr scraper DigitalSport
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROXY_SERVER:   ${{ secrets.PROXY_SERVER }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
        run: python codigo_digitalsport.py

      - name: Subir outputs DigitalSport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outputs-digitalsport
          path: |
            digitalsport_vs_nike_visual_*.xlsx
            digitalsport_vs_nike_raw_*.csv
          retention-days: 30

  # ─────────────────────────────────────────
  # 5) SOLO DEPORTES
  # ─────────────────────────────────────────
  solodeportes:
    name: Solo Deportes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Correr scraper SoloDeportes
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROXY_SERVER:   ${{ secrets.PROXY_SERVER }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
          HEADLESS: "true"
        run: python codigo_soloDeportes.py

      - name: Subir outputs SoloDeportes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outputs-solodeportes
          path: |
            solodeportes_vs_nike_*.xlsx
            solodeportes_vs_nike_*.csv
          retention-days: 30

      # Persistir cache en el repo para evitar reconstruirlo cada semana
      - name: Guardar cache SoloDeportes en repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f solodeportes_cache.json || true
          git diff --staged --quiet || git commit -m "chore: update solodeportes cache [skip ci]"
          git push || true

  # ─────────────────────────────────────────
