      - name: Subir outputs Meli Adidas/Puma
        uses: actions/upload-artifact@v4
        with:
          name: outputs-meli-adidas-puma
          path: "meli_nike_adidas_puma_*.xlsx"
          retention-days: 30

  # ─────────────────────────────────────────
