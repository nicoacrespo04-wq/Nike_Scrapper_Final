name: Weekly Scrapers

on:
  schedule:
    # Todos los lunes a las 12:00 UTC = 09:00 AM Argentina
    - cron: '0 12 * * 1'
  workflow_dispatch:  # Permite correrlo manualmente desde GitHub

jobs:

  # ─────────────────────────────────────────
  # 1) ADIDAS AR + US
  # ─────────────────────────────────────────
  adidas:
    name: Adidas AR + US
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Correr scraper Adidas
        env:
          AR_PROXY_USER: ${{ secrets.AR_PROXY_USER }}
          AR_PROXY_PASS: ${{ secrets.AR_PROXY_PASS }}
          US_PROXY_USER: ${{ secrets.US_PROXY_USER }}
          US_PROXY_PASS: ${{ secrets.US_PROXY_PASS }}
        run: python codigo_adidas_6.py

      - name: Subir outputs Adidas
        uses: actions/upload-artifact@v4
        with:
          name: outputs-adidas
          path: |
            Adidas_Monitoring_*.xlsx
            Adidas_*.csv
          retention-days: 30

  # ─────────────────────────────────────────
  # 2) MELI — Adidas vs Puma
  # ─────────────────────────────────────────
